<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITEM GENERATOR (CREATE ITEM)</title>
    <style>
        :root {
            --bg: #0f1115;
            --card: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --accent: #58a6ff;
            --success: #2ea043;
            --warning: #d29922;
            --error: #da3633;
            --btn-paint: #1f6feb;
            --btn-stamp: #a371f7;
            --btn-item: #238636;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            padding: 20px; 
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }Anci

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.5rem;
            background: linear-gradient(90deg, var(--accent), var(--btn-stamp));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;        }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
        }
        
        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent);
            background: rgba(88, 166, 255, 0.05);
        }

        input[type="file"] { display: none; }

        .status {
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            text-align: center;
        }
        .status.success { color: var(--success); border: 1px solid var(--success); }
        .status.error { color: var(--error); border: 1px solid var(--error); }

        .field-group {
            margin-bottom: 15px;
            padding: 15px;
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .field-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .field-header.paint { color: var(--btn-paint); }        .field-header.item { color: var(--btn-item); }
        .field-header.stamp { color: var(--btn-stamp); }

        .current-value {
            font-family: monospace;
            background: #000;
            padding: 8px;
            border-radius: 4px;
            color: #aaa;
            margin-bottom: 10px;
            word-break: break-all;
        }

        .btn-edit {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-edit:hover { opacity: 0.9; }
        .btn-edit.paint { background: var(--btn-paint); }
        .btn-edit.item { background: var(--btn-item); }
        .btn-edit.stamp { background: var(--btn-stamp); }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-main {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            color: #fff;
        }
        .btn-save { background: var(--success); }
        .btn-reset { background: var(--error); }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Modal / Popup Catalog */
        .modal-overlay {
            display: none;            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal {
            background: var(--card);
            border: 1px solid var(--border);
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--error);
            font-size: 1.2rem;
            cursor: pointer;
        }

        .modal-list {
            overflow-y: auto;
            padding: 10px;
            flex-grow: 1;
        }

        .list-item {
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: background 0.2s;
        }
        .list-item:hover { background: rgba(255,255,255,0.1); }
        .list-item.selected { background: var(--accent); color: #fff; border-radius: 4px; }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
    </style>
</head>

    function loadFile(file) {
        fileName = file.name;
        status.className = 'status';
        status.innerText = `Membaca ${file.name}...`;
        
        const reader = new FileReader();
        reader.onload = (e) => {

            parseBinary(fileBuffer);
        };        reader.readAsArrayBuffer(file);

    // --- BINARY PARSER ---
    // Mencari pola: 5f 00 6b 00 65 00 79 00 (key) -> length -> value -> 5f 00 76 00... (value)
    function parseBinary(buffer) {
        parsedFields = [];
        let offset = 0;
        
        // Marker Hex
        const KEY_MARKER = [0x5f, 0x00, 0x6b, 0x00, 0x65, 0x00, 0x79, 0x00]; // "_key"
        const VALUE_MARKER = [0x5f, 0x00, 0x76, 0x00, 0x61, 0x00, 0x6c, 0x00, 0x75, 0x00, 0x65, 0x00]; // "_value"

        // Scan loop
        while (offset < buffer.length - 20) {
            // Check for Key Marker
            if (checkMarker(buffer, offset, KEY_MARKER)) {
                offset += KEY_MARKER.length;
                
                // Read Key Length (2 bytes Little Endian)
                const keyLen = buffer[offset] | (buffer[offset+1] << 8);
                offset += 2;

                // Read Key Name
                const keyName = readUTF16(buffer, offset, keyLen);
                offset += keyLen;

                // Skip null bytes or separators if any until Value Marker
                // Asumsi struktur: (KeyData) ... (ValueMarker)
                // Kita cari Value Marker terdekat
                let valMarkerOffset = -1;
                for(let i = offset; i < buffer.length - 12; i++) {
                    if (checkMarker(buffer, i, VALUE_MARKER)) {
                        valMarkerOffset = i;
                        break;
                    }
                }

                if (valMarkerOffset !== -1) {
                    offset = valMarkerOffset + VALUE_MARKER.length;
                    
                    // Read Value Length
                    const valLen = buffer[offset] | (buffer[offset+1] << 8);
                    offset += 2;

                    // Read Value
                    const valData = readUTF16(buffer, offset, valLen);
                    
                    // Cek apakah ini field yang kita cari
                    if (keyName === 'paint' || keyName === 'item_id' || keyName === 'stamp') {                        parsedFields.push({
                            key: keyName,
                            value: valData,
                            offsetKey: valMarkerOffset - KEY_MARKER.length, // Simpan offset untuk writeback
                            offsetVal: offset,
                            valLen: valLen
                        });
                    }
                    offset += valLen;
                }
            } else {
                offset++;
            }
        }

        if (parsedFields.length > 0) {
            status.className = 'status success';
            status.innerText = `Berhasil mendeteksi ${parsedFields.length} field!`;
            renderFields();
            btnSave.disabled = false;
        } else {
            status.className = 'status error';
            status.innerText = "Tidak ditemukan field paint, item_id, atau stamp.";
            btnSave.disabled = true;
        }
    }

    function checkMarker(buf, start, marker) {
        for (let i = 0; i < marker.length; i++) {
            if (buf[start + i] !== marker[i]) return false;
        }
        return true;
    }

    function readUTF16(buf, start, length) {
        // Convert bytes to string manually to handle UTF16 LE safely
        let str = "";
        for (let i = 0; i < length; i += 2) {
            const charCode = buf[start + i] | (buf[start + i + 1] << 8);
            if (charCode === 0) break; // Null terminator
            str += String.fromCharCode(charCode);
        }
        return str;
    }

    // --- UI RENDERING ---
    function renderFields() {
        fieldsContainer.innerHTML = '';
        parsedFields.forEach((field, index) => {
            const typeClass = field.key === 'paint' ? 'paint' : (field.key === 'stamp' ? 'stamp' : 'item');            
            const div = document.createElement('div');
            div.className = 'field-group';
            div.innerHTML = `
                <div class="field-header ${typeClass}">
                    <span>🔑 ${field.key.toUpperCase()}</span>
                </div>
                <div class="current-value" id="val-${index}">${field.value}</div>
                <button class="btn-edit ${typeClass}" onclick="openCatalog('${field.key}', ${index})">
                    Pilih ${field.key.charAt(0).toUpperCase() + field.key.slice(1)}...
                </button>
            `;
            fieldsContainer.appendChild(div);
        });
    }

    // --- CATALOG MODAL ---
    function openCatalog(type, fieldIndex) {
        currentEditingKey = { type, index: fieldIndex };
        modalTitle.innerText = `Pilih ${type.charAt(0).toUpperCase() + type.slice(1)}`;
        catalogList.innerHTML = '';

        const items = CATALOG[type] || [];
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerText = item;
            div.onclick = () => selectItem(item);
            if (item === parsedFields[fieldIndex].value) div.classList.add('selected');
            catalogList.appendChild(div);
        });

        modal.style.display = 'flex';
    }

    function selectItem(value) {
        if (!currentEditingKey) return;
        
        // Update data
        parsedFields[currentEditingKey.index].value = value;
        
        // Update UI Text
        document.getElementById(`val-${currentEditingKey.index}`).innerText = value;
        
        // Update UI Button Color (Optional visual feedback)
        // In a real app, you might want to update the binary buffer immediately here or on save
        
        closeModal();
    }
    function closeModal() {
        modal.style.display = 'none';
        currentEditingKey = null;
    }

    // --- WRITE BACK & DOWNLOAD ---
    function downloadFile() {
        if (!fileBuffer) return;

        // Buat copy buffer agar tidak merusak data asli di memori
        const newBuffer = new Uint8Array(fileBuffer);

        parsedFields.forEach(field => {
            const newVal = field.value;
            const newBytes = stringToUTF16Bytes(newVal);
            
            // Update Length Header
            newBuffer[field.offsetVal - 2] = newBytes.length & 0xFF;
            newBuffer[field.offsetVal - 1] = (newBytes.length >> 8) & 0xFF;

            // Update Content
            for (let i = 0; i < newBytes.length; i++) {
                newBuffer[field.offsetVal + i] = newBytes[i];
            }

            // Padding with zeros if new string is shorter than old slot
            for (let i = newBytes.length; i < field.valLen; i++) {
                newBuffer[field.offsetVal + i] = 0x00;
            }
        });

        // Trigger Download
        const blob = new Blob([newBuffer], {type: "application/octet-stream"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `patched_${fileName}`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function stringToUTF16Bytes(str) {
        const bytes = [];
        for (let i = 0; i < str.length; i++) {
            const code = str.charCodeAt(i);
            bytes.push(code & 0xFF);
            bytes.push((code >> 8) & 0xFF);
        }
        return bytes;
    }
    function resetUI() {
        fileBuffer = null;
        parsedFields = [];
        fileName = "";
        fieldsContainer.innerHTML = '';
        status.className = 'status';
        status.innerText = "Menunggu file...";
        btnSave.disabled = true;
        fileInput.value = '';
    }
</script>
